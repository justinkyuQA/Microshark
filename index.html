<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MicroShark</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#000000">
</head>

<body>

<div class="container">

<h1>🦈 MicroShark</h1>

<p class="subtitle">
Understand network traffic.
</p>

<button id="scanBtn">
START CAPTURE
</button>

<div id="results">

<div class="card">
<h3>🌐 HTTPS</h3>
<p>Count: 128</p>
<p>Secure website traffic.</p>
</div>

<div class="card">
<h3>🔍 DNS</h3>
<p>Count: 42</p>
<p>Domain lookups.</p>
</div>

<div class="card">
<h3>📡 ARP</h3>
<p>Count: 8</p>
<p>Device discovery.</p>
</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
